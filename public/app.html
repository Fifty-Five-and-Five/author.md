<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>author.md - Interview</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="logo-row">
        <img src="/assets/icon.svg" alt="55&5">
        <h2>author.md</h2>
      </div>

      <div class="sidebar-section">
        <h3>Skill file</h3>
        <div class="file-upload" id="file-upload">
          <input type="file" id="skill-file" accept=".md,.txt">
          <div class="label">Drop <strong>.md file</strong> or click to upload</div>
        </div>
      </div>

      <div class="sidebar-section">
        <h3>About you</h3>
        <div class="form-group">
          <input type="text" id="user-name" placeholder="Your name">
        </div>
        <div class="form-group">
          <input type="text" id="user-company" placeholder="Company (optional)">
        </div>
        <div class="form-group">
          <textarea id="user-notes" placeholder="Anything the interviewer should know..."></textarea>
        </div>
      </div>

      <div class="sidebar-section" style="flex:1; min-height:0; display:flex; flex-direction:column;">
        <h3>Transcript</h3>
        <div class="transcript-box" id="transcript">
          <div class="empty">Transcript will appear here during the interview</div>
        </div>
      </div>
    </aside>

    <main class="main-area">
      <div class="orb-container">
        <canvas id="orb" width="800" height="800"></canvas>
      </div>
      <div class="status-label" id="status">Upload a skill file and enter your name to begin</div>
      <div class="controls">
        <button class="btn btn-primary" id="btn-start" disabled>Start interview</button>
        <button class="btn btn-ghost" id="btn-end" style="display:none">End &amp; generate</button>
      </div>
    </main>
  </div>

  <div class="result-overlay" id="result-overlay">
    <div class="result-card">
      <h2>Your author.md</h2>
      <pre id="result-content"></pre>
      <div class="actions">
        <button class="btn btn-ghost" id="btn-close-result">Close</button>
        <button class="btn btn-primary" id="btn-download">Download author.md</button>
      </div>
    </div>
  </div>

  <script src="/js/orb.js"></script>
  <script src="/js/realtime.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
